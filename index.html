
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJAIB4D — CLAIM BONUS NEW MEMBER</title>
    <link rel="icon" type="image/x-icon" href="https://imgora.xyz//uploads/1777240196_LOGO_4D-removebg-preview.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Playfair+Display:wght@400;700;900&display=swap');

        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --gold-pale: #fff8dc;
            --gold-dark: #b8860b;
            --black: #0a0a0a;
            --black-light: #1a1a1a;
            --black-soft: #2a2a2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { margin: 0; overflow-x: hidden; font-family: 'Playfair Display', serif; background: #0a0a0a; }

        /* ========== BACKGROUND ========== */
        .bg-luxury {
            position: fixed; inset: 0; z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(212,175,55,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(184,134,11,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #1a1a1a 0%, #0a0a0a 70%);
        }

        /* Gold particles */
        @keyframes gold-float {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-15vh) translateX(50px) rotate(360deg); opacity: 0; }
        }
        .gold-particle {
            position: fixed; pointer-events: none; z-index: 3;
            border-radius: 50%;
            background: radial-gradient(circle, #f4d03f, #d4af37, #b8860b);
            box-shadow: 0 0 8px rgba(212,175,55,0.8), 0 0 16px rgba(212,175,55,0.4);
            animation: gold-float linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        .star-gold {
            position: fixed; border-radius: 50%;
            background: #d4af37;
            box-shadow: 0 0 4px rgba(212,175,55,0.9);
            pointer-events: none; z-index: 1;
            animation: twinkle ease-in-out infinite;
        }

        /* ========== ORNAMENTS ========== */
        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(212,175,55,1)) drop-shadow(0 0 40px rgba(212,175,55,0.5)); }
        }
        .ornament {
            position: fixed; pointer-events: none; z-index: 2;
            animation: glow-pulse 3s ease-in-out infinite;
        }
        /* Hide ornaments on small screens */
        @media (max-width: 480px) { .ornament { display: none; } }

        /* ========== LIGHT BEAMS ========== */
        @keyframes beam-pulse {
            0%, 100% { opacity: 0.05; }
            50% { opacity: 0.15; }
        }
        .light-beam {
            position: fixed; top: 0; pointer-events: none; z-index: 2;
            background: linear-gradient(180deg, rgba(212,175,55,0.3) 0%, transparent 70%);
            transform-origin: top center;
            animation: beam-pulse ease-in-out infinite;
        }
        /* Reduce beams on mobile */
        @media (max-width: 480px) {
            .light-beam-hide { display: none; }
        }

        .bottom-glow {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 250px; z-index: 2; pointer-events: none;
            background: radial-gradient(ellipse at 50% 100%, rgba(212,175,55,0.2) 0%, transparent 70%);
        }

        /* ========== UI LAYER ========== */
        .ui-content { position: relative; z-index: 10; }

        /* ========== LUXURY GLASS BUTTONS ========== */
        .lbtn {
            position: relative; overflow: hidden; cursor: pointer;
            font-family: 'Cinzel', serif; font-weight: 700;
            letter-spacing: 0.08em; transition: all 0.4s ease;
            display: inline-flex; align-items: center; justify-content: center;
            text-transform: uppercase;
            touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        .lbtn::before {
            content: '';
            position: absolute; top: 0; left: -120%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }
        .lbtn:hover::before { left: 140%; }
        .lbtn::after {
            content: '';
            position: absolute; top: 0; left: 5%; right: 5%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.9), transparent);
        }
        .lbtn:hover { transform: translateY(-3px) scale(1.04); }
        .lbtn:active { transform: scale(0.96) !important; opacity: 0.85; }

        .lbtn-primary {
            background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.5);
            box-shadow: 
                0 0 25px rgba(212,175,55,0.2),
                inset 0 1px 0 rgba(212,175,55,0.3),
                inset 0 -1px 0 rgba(184,134,11,0.2);
            color: #f4d03f;
        }
        .lbtn-primary:hover {
            background: linear-gradient(135deg, rgba(212,175,55,0.35) 0%, rgba(0,0,0,0.5) 100%);
            border-color: rgba(244,208,63,0.9);
            box-shadow: 
                0 12px 40px rgba(0,0,0,0.6),
                0 0 50px rgba(212,175,55,0.5),
                inset 0 1px 0 rgba(244,208,63,0.5);
            color: #fff8dc;
        }

        .lbtn-dark {
            background: linear-gradient(135deg, rgba(26,26,26,0.85) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.35);
            box-shadow: 
                0 0 15px rgba(212,175,55,0.1),
                inset 0 1px 0 rgba(212,175,55,0.15);
            color: #d4af37;
        }
        .lbtn-dark:hover {
            background: linear-gradient(135deg, rgba(42,42,42,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border-color: rgba(212,175,55,0.7);
            box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 30px rgba(212,175,55,0.3);
            color: #f4d03f;
        }

        .lbtn-glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212,175,55,0.3);
            box-shadow: inset 0 1px 0 rgba(212,175,55,0.15);
            color: #d4af37;
        }
        .lbtn-glass:hover {
            background: rgba(212,175,55,0.1);
            border-color: rgba(212,175,55,0.7);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 25px rgba(212,175,55,0.3);
            color: #f4d03f;
        }

        .lbtn-danger {
            background: linear-gradient(135deg, rgba(120,20,20,0.4) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(212,175,55,0.3);
            color: #d4af37;
        }
        .lbtn-danger:hover {
            background: linear-gradient(135deg, rgba(160,30,30,0.5) 0%, rgba(20,0,0,0.8) 100%);
            border-color: rgba(212,175,55,0.6);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(180,30,30,0.4);
            color: #f4d03f;
        }

        /* ========== PLAYING CARDS ========== */
        .card-container {
            perspective: 1200px;
            cursor: pointer;
        }
        .card-flipper {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .card-flipper.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-back {
            background: 
                linear-gradient(135deg, rgba(212,175,55,0.08), rgba(0,0,0,0.9)),
                radial-gradient(circle at 50% 50%, rgba(212,175,55,0.15) 0%, transparent 60%);
            border: 2px solid rgba(212,175,55,0.6);
            box-shadow: 
                0 8px 30px rgba(0,0,0,0.6),
                0 0 20px rgba(212,175,55,0.2),
                inset 0 0 30px rgba(212,175,55,0.1);
            transition: all 0.4s ease;
        }
        .card-back::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 10px;
            pointer-events: none;
        }
        .card-back-pattern {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 28px;
            background: linear-gradient(135deg, #f4d03f, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0 2px 6px rgba(212,175,55,0.5));
        }
        /* Responsive card pattern font */
        @media (max-width: 400px) { .card-back-pattern { font-size: 20px; } }
        @media (min-width: 480px) { .card-back-pattern { font-size: 36px; } }

        .card-back-pattern .small {
            font-size: 9px;
            letter-spacing: 0.3em;
            display: block;
            margin-top: 4px;
            opacity: 0.7;
        }
        @media (min-width: 480px) { .card-back-pattern .small { font-size: 11px; } }

        .card-front {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #fff8dc 0%, #f4d03f 50%, #d4af37 100%);
            border: 2px solid #d4af37;
            box-shadow: 
                0 8px 40px rgba(0,0,0,0.7),
                0 0 40px rgba(212,175,55,0.6),
                inset 0 0 20px rgba(255,255,255,0.3);
        }
        .card-content {
            text-align: center;
            color: #0a0a0a;
            padding: 6px;
        }
        .card-content .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 2px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        @media (max-width: 400px) { .card-content .icon { font-size: 22px; } }
        @media (min-width: 480px) { .card-content .icon { font-size: 38px; } }

        .card-content .label {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 9px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1.2;
        }
        @media (min-width: 480px) { .card-content .label { font-size: 11px; letter-spacing: 0.1em; } }

        .card-container:hover .card-flipper:not(.flipped) {
            transform: translateY(-8px) rotateY(0deg);
        }
        .card-container:hover .card-back {
            box-shadow: 
                0 15px 50px rgba(0,0,0,0.8),
                0 0 40px rgba(212,175,55,0.5),
                inset 0 0 40px rgba(212,175,55,0.2);
            border-color: rgba(244,208,63,0.9);
        }
        .card-flipper.winner-card {
            animation: winner-pulse 1.2s ease-in-out infinite;
        }
        @keyframes winner-pulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.06); }
        }

        /* ========== GLASS PANEL ========== */
        .luxury-panel {
            background: linear-gradient(135deg, rgba(26,26,26,0.85) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(212,175,55,0.3);
            box-shadow: 
                0 8px 40px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(212,175,55,0.15);
        }
        .luxury-panel-gold {
            background: linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(212,175,55,0.5);
            box-shadow: 
                0 8px 40px rgba(0,0,0,0.6),
                0 0 30px rgba(212,175,55,0.15),
                inset 0 1px 0 rgba(212,175,55,0.25);
        }

        /* ========== MARQUEE ========== */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 40s linear infinite; }

        /* ========== ANIMATIONS ========== */
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); box-shadow: 0 0 25px rgba(212,175,55,0.4); }
            50% { transform: scale(1.04); box-shadow: 0 0 50px rgba(212,175,55,0.8), 0 0 80px rgba(212,175,55,0.3); }
        }
        .animate-pulse-gold { animation: pulse-gold 2.5s ease-in-out infinite; }

        @keyframes bounce-chat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-chat { animation: bounce-chat 2s ease-in-out infinite; }

        @keyframes glow-frame {
            0%, 100% { box-shadow: 0 0 20px rgba(212,175,55,0.4), 0 0 40px rgba(212,175,55,0.2); }
            50% { box-shadow: 0 0 40px rgba(212,175,55,0.8), 0 0 70px rgba(212,175,55,0.4); }
        }
        .animate-glow { animation: glow-frame 3s ease-in-out infinite; }

        /* ========== SOUND BUTTON ========== */
        @keyframes sound-pulse {
            0%, 100% { box-shadow: 0 0 12px rgba(212,175,55,0.4); }
            50% { box-shadow: 0 0 30px rgba(212,175,55,0.9), 0 0 55px rgba(212,175,55,0.4); }
        }
        .lbtn-sound {
            background: linear-gradient(135deg, rgba(26,26,26,0.85), rgba(0,0,0,0.95));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.5);
            box-shadow: 0 0 15px rgba(212,175,55,0.3);
            color: #d4af37;
            font-weight: 800;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }
        .lbtn-sound.playing { animation: sound-pulse 1.8s ease-in-out infinite; }
        .lbtn-sound:hover {
            background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(0,0,0,0.8));
            border-color: rgba(244,208,63,0.9);
            color: #f4d03f;
            transform: scale(1.08);
        }

        /* ========== FLYING ELEMENTS ========== */
        @keyframes elem-fly {
            0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.6) rotate(180deg); }
        }
        .fly-elem { 
            position: fixed; 
            font-size: 24px; 
            pointer-events: none; 
            z-index: 100; 
            animation: elem-fly 1.5s ease-out forwards;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212,175,55,0.8);
        }

        /* ========== RIPPLE ========== */
        @keyframes ripple-expand { to { transform: scale(4); opacity: 0; } }
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(212,175,55,0.4);
            transform: scale(0); animation: ripple-expand 0.7s linear;
            pointer-events: none;
        }

        /* Input style */
        .luxury-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.4);
            backdrop-filter: blur(15px);
            color: #f4d03f;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            font-size: 16px; /* IMPORTANT: prevents iOS auto-zoom */
        }
        .luxury-input:focus { 
            border-color: rgba(212,175,55,0.9); 
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
            background: rgba(0,0,0,0.7);
        }
        .luxury-input::placeholder { color: rgba(212,175,55,0.4); }

        /* Decorative divider */
        .gold-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }
        .gold-divider .line {
            height: 1px;
            width: 50px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.8), transparent);
        }
        .gold-divider .symbol {
            color: #d4af37;
            font-size: 16px;
        }

        /* Shimmer text */
        @keyframes text-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .gold-text-shimmer {
            background: linear-gradient(90deg, #b8860b 0%, #f4d03f 25%, #fff8dc 50%, #f4d03f 75%, #b8860b 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: text-shimmer 3s linear infinite;
        }

        /* Card grid stagger animation */
        @keyframes card-appear {
            0% { opacity: 0; transform: translateY(40px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-container { animation: card-appear 0.5s ease-out backwards; }

        /* ========== FLOATING CONTROLS — MOBILE OPTIMIZED ========== */
        .top-controls {
            position: fixed;
            top: 50px; /* below marquee */
            right: 10px;
            display: flex;
            flex-direction: row;
            gap: 8px;
            z-index: 20;
        }
        .ctrl-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        @media (min-width: 480px) {
            .top-controls {
                top: 58px;
                right: 14px;
                flex-direction: column;
                gap: 10px;
            }
            .ctrl-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
        }

        /* Member counter responsive */
        .member-counter {
            position: fixed;
            top: 50px;
            left: 8px;
            z-index: 20;
        }
        @media (min-width: 480px) {
            .member-counter { top: 58px; left: 14px; }
        }

        /* Live chat button responsive */
        .live-chat-btn {
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 20;
        }

        /* ========== MARQUEE BAR ========== */
        .marquee-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            overflow: hidden;
            z-index: 30;
            background: linear-gradient(90deg,rgba(0,0,0,0.9),rgba(20,20,20,0.95),rgba(0,0,0,0.9));
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212,175,55,0.4);
            padding: 8px 0;
            height: 42px;
            display: flex;
            align-items: center;
        }
        @media (min-width: 480px) {
            .marquee-bar { height: 48px; padding: 10px 0; }
        }

        /* ========== WELCOME PAGE RESPONSIVE ========== */
        .welcome-logo { font-size: clamp(2.2rem, 12vw, 5rem); }
        .welcome-title { font-size: clamp(1.6rem, 8vw, 3.5rem); }
        .welcome-subtitle { font-size: clamp(0.9rem, 4vw, 1.1rem); }
        .welcome-desc-text { font-size: clamp(0.85rem, 3.5vw, 1rem); }

        /* ========== CARD SELECTION RESPONSIVE ========== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 360px;
            margin: 0 auto;
        }
        @media (min-width: 400px) {
            .card-grid { gap: 12px; max-width: 400px; }
        }
        @media (min-width: 480px) {
            .card-grid { gap: 16px; max-width: 500px; }
        }
        @media (min-width: 600px) {
            .card-grid { gap: 20px; max-width: 560px; }
        }

        /* ========== RESULT PAGE RESPONSIVE ========== */
        .result-prize-value { font-size: clamp(1.6rem, 8vw, 2.2rem); }

        /* ========== MODAL RESPONSIVE ========== */
        .prize-modal-inner {
            max-width: 500px;
            width: calc(100% - 20px);
            margin: 0 auto;
        }
        .prize-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        @media (min-width: 480px) {
            .prize-grid { gap: 14px; }
        }

        /* ========== APP PADDING RESPONSIVE ========== */
        #app {
            padding-top: 110px !important; /* marquee + member counter */
            padding-bottom: 100px !important; /* live chat btn */
            padding-left: 12px;
            padding-right: 12px;
        }
        @media (min-width: 480px) {
            #app {
                padding-top: 130px !important;
                padding-left: 16px;
                padding-right: 16px;
            }
        }

        /* Safe bottom on iOS */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            #app { padding-bottom: calc(100px + env(safe-area-inset-bottom)) !important; }
            .live-chat-btn { bottom: calc(14px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>

    <!-- Luxury Background -->
    <div class="bg-luxury"></div>

    <!-- Stars -->
    <div id="starfield"></div>

    <!-- Light beams -->
    <div class="light-beam" style="left:8%;width:90px;height:100vh;animation-duration:7s;"></div>
    <div class="light-beam light-beam-hide" style="left:28%;width:55px;height:100vh;animation-duration:9s;animation-delay:1s;"></div>
    <div class="light-beam" style="left:48%;width:120px;height:100vh;animation-duration:6s;animation-delay:2s;"></div>
    <div class="light-beam light-beam-hide" style="left:68%;width:70px;height:100vh;animation-duration:8s;animation-delay:0.5s;"></div>
    <div class="light-beam" style="left:85%;width:85px;height:100vh;animation-duration:7.5s;animation-delay:1.5s;"></div>

    <!-- Bottom glow -->
    <div class="bottom-glow"></div>

    <!-- Corner Ornaments (hidden on mobile) -->
    <div class="ornament" style="top:20px;left:20px;animation-duration:4s;">

    // ========== ELEGANT MUSIC ==========
    let audioCtx = null, musicPlaying = false, musicTimer = null;
    function getCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }
    const N = { C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196, A3:220, B3:246.94, C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392, A4:440, B4:493.88, C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880 };
    const MELODY = [
        {n:'C5',d:.5},{n:'E5',d:.25},{n:'G5',d:.25},{n:'E5',d:.5},{n:'C5',d:.5},
        {n:'A4',d:.5},{n:'C5',d:.25},{n:'E5',d:.25},{n:'C5',d:1},
        {n:'F5',d:.5},{n:'A4',d:.25},{n:'C5',d:.25},{n:'F5',d:.5},{n:'A4',d:.5},
        {n:'G4',d:.5},{n:'B4',d:.25},{n:'D5',d:.25},{n:'G4',d:1},
        {n:'E5',d:.25},{n:'D5',d:.25},{n:'C5',d:.25},{n:'B4',d:.25},{n:'A4',d:.5},{n:'G4',d:.5},
        {n:'F4',d:.5},{n:'A4',d:.25},{n:'C5',d:.25},{n:'F5',d:1},
    ];
    function pNote(f,t,dur,type,vol,ctx){ 
        const o=ctx.createOscillator(),g=ctx.createGain(); 
        o.connect(g); g.connect(ctx.destination); 
        o.type=type; o.frequency.value=f; 
        g.gain.setValueAtTime(0,t); 
        g.gain.linearRampToValueAtTime(vol,t+.03); 
        g.gain.setValueAtTime(vol,t+dur*.7); 
        g.gain.linearRampToValueAtTime(0,t+dur); 
        o.start(t); o.stop(t+dur+.05); 
    }
    function pBell(f,t,ctx){ 
        [1,2.4,3.8].forEach(r=>{ 
            const o=ctx.createOscillator(),g=ctx.createGain(); 
            o.connect(g); g.connect(ctx.destination); 
            o.type='sine'; o.frequency.value=f*r; 
            g.gain.setValueAtTime(.04,t); 
            g.gain.exponentialRampToValueAtTime(.001,t+2); 
            o.start(t); o.stop(t+2.1); 
        }); 
    }
    function scheduleLoop(){
        if(!musicPlaying)return;
        const ctx=getCtx(), bpm=80, beat=60/bpm, start=ctx.currentTime+.05;
        let t=start;
        MELODY.forEach(note=>{ pNote(N[note.n],t,note.d*beat*.85,'sine',.09,ctx); t+=note.d*beat; });
        let ht=start; MELODY.forEach(note=>{ pNote(N[note.n]*0.5,ht,note.d*beat*.7,'triangle',.05,ctx); ht+=note.d*beat; });
        const bass=[{n:'C3',d:2},{n:'A3',d:2},{n:'F3',d:2},{n:'G3',d:2},{n:'C3',d:2},{n:'F3',d:2},{n:'G3',d:1},{n:'C3',d:1}];
        let bt=start; bass.forEach(note=>{ pNote(N[note.n],bt,note.d*beat*.85,'sine',.06,ctx); bt+=note.d*beat; });
        const totalBeats = MELODY.reduce((s,n)=>s+n.d,0);
        for(let i=0;i<totalBeats;i+=4){ pBell(N['C5'],start+i*beat,ctx); }
        const loopDur=MELODY.reduce((s,n)=>s+n.d*beat,0);
        musicTimer=setTimeout(scheduleLoop,(loopDur-.3)*1000);
    }
    function startMusic(){ 
        if(musicPlaying)return; 
        musicPlaying=true; 
        scheduleLoop(); 
        document.getElementById('musicIcon').textContent='🎶'; 
        document.getElementById('musicToggle').classList.add('playing'); 
    }
    function stopMusic(){ 
        musicPlaying=false; 
        clearTimeout(musicTimer); 
        document.getElementById('musicIcon').textContent='🎵'; 
        document.getElementById('musicToggle').classList.remove('playing'); 
    }

        const x = (e.clientX||r.left+r.width/2)-r.left, y = (e.clientY||r.top+r.height/2)-r.top;
        const size = Math.max(r.width,r.height);
        const rip = document.createElement('span'); rip.className='ripple';
        rip.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
        btn.appendChild(rip); rip.addEventListener('animationend',()=>rip.remove());
    }

            // Focus input after a brief delay on mobile to prevent keyboard issues
            setTimeout(() => {
                const inp = document.getElementById('userIdInput');
                if (inp && window.innerWidth >= 480) inp.focus();
            }, 300);
            document.getElementById('continueBtn').onclick=e=>{
                playSound('click');
                const v=document.getElementById('userIdInput').value.trim();
                const err=document.getElementById('errorMsg');
                if(!v){ err.textContent='⚠ MASUKKAN USER ID ANDA!'; err.classList.remove('hidden'); return; }
                const n=v.toLowerCase();
                if(claimedUsers.includes(n)){ err.textContent='⚠ USER ID INI SUDAH MENGKLAIM HADIAH!'; err.classList.remove('hidden'); return; }
                userId=n; localStorage.setItem("USER_ID_TK",userId);
                claimedUsers.push(n); localStorage.setItem("CLAIMED_USERS_TK",JSON.stringify(claimedUsers));
                stage='select'; render();
            };
            document.getElementById('userIdInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('continueBtn').click();
                }
            });
        } else if(stage==='select'){
            app.innerHTML=renderCardSelection();
            const rp=[
                {name:'Saldo 100rb',value:'Rp 100.000',icon:'💸'},
                {name:'Saldo 250rb',value:'Rp 250.000',icon:'💸'},
                {name:'Saldo 500rb',value:'Rp 500.000',icon:'💸'},
                {name:'Saldo 1 Juta',value:'Rp 1.000.000',icon:'💸'}
            ];
            document.querySelectorAll('.card-container').forEach((card)=>{
                card.onclick=function(e){
                    if (this.dataset.flipped === 'true') return;
                    playSound('flip');
                    const cx = e.clientX || (this.getBoundingClientRect().left + this.offsetWidth/2);
                    const cy = e.clientY || (this.getBoundingClientRect().top + this.offsetHeight/2);
                    spawnFly(cx-15,cy-10); 
                    spawnFly(cx+15,cy-15);
                    document.querySelectorAll('.card-container').forEach(c=>{
                        if (c !== this) {
                            c.style.pointerEvents = 'none';
                            c.style.opacity = '0.4';
                            c.style.transition = 'opacity 0.5s';
                        }
                    });
                    const prize = rp[Math.floor(Math.random()*rp.length)];
                    const frontContent = this.querySelector('.card-content');
                    frontContent.querySelector('.icon').textContent = prize.icon;
                    frontContent.querySelector('.label').textContent = prize.value;
                    const flipper = this.querySelector('.card-flipper');
                    flipper.classList.add('flipped');
                    this.dataset.flipped = 'true';
                    setTimeout(() => { flipper.classList.add('winner-card'); }, 800);
                    setTimeout(()=>{
                        playSound('win');
                        for(let i=0;i<10;i++){
                            setTimeout(()=>{
                                spawnFly(cx+(Math.random()*100-50),cy+(Math.random()*100-50));
                            }, i*60);
                        }
                    },1200);
                    setTimeout(()=>{
                        stage='result'; 
                        app.innerHTML=renderResult(prize);
                        document.getElementById('claimBtn').onclick=()=>{ 
                            playSound('click'); 
                            window.open('https://shorthe.link/masukajaib4d/','_blank'); 
                        };
                        document.getElementById('resetBtn').onclick=()=>{ 
                            playSound('click'); 
                            stage='welcome'; userId=''; render(); 
                        };
                    },2800);
                };
            });
        }
    }

    function showPrizeModal(){
        document.getElementById('prizeList').innerHTML=prizes.map(p=>`
            <div class="luxury-panel rounded-xl p-3 text-center" style="border-color:rgba(212,175,55,0.3);">
                <div class="mb-1" style="font-size:clamp(24px,8vw,36px);filter:drop-shadow(0 0 8px rgba(212,175,55,0.5));">${p.icon}</div>
                <h3 class="font-bold mb-1" style="color:#d4af37;font-family:'Cinzel',serif;letter-spacing:0.04em;font-size:clamp(10px,3vw,13px);">${p.name}</h3>
                <div class="rounded-lg py-2 px-2" style="background:rgba(0,0,0,0.6);border:1px solid rgba(212,175,55,0.2);">
                    <p class="font-bold gold-text-shimmer" style="font-family:'Cinzel',serif;font-size:clamp(11px,3.5vw,15px);">${p.value}</p>
                </div>
            </div>`).join('');
        document.getElementById('prizeModal').classList.remove('hidden');
        // Prevent body scroll when modal open
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('soundToggle').onclick=()=>{ 
        soundEnabled=!soundEnabled; 
        document.getElementById('soundIcon').textContent=soundEnabled?'🔊':'🔇'; 
    };
    document.getElementById('musicToggle').onclick=e=>{ 
        if(musicPlaying){stopMusic();}
        else{
            startMusic();
            const x=e.clientX||window.innerWidth-30, y=e.clientY||80;
            spawnFly(x-10,y-10); spawnFly(x+10,y-20);
        } 
    };
    document.getElementById('liveChatBtn').onclick=()=>{ 
        playSound('click'); 
        window.open('https://static.zdassets.com/web_widget/latest/liveChat.html?v=10#key=hokiajaib4d.zendesk.com','_blank'); 
    };
    document.getElementById('closePrizeModal').onclick=()=>{ 
        playSound('click'); 
        document.getElementById('prizeModal').classList.add('hidden');
        document.body.style.overflow = '';
    };
    // Close modal on backdrop tap (mobile)
    document.getElementById('prizeModal').addEventListener('click', function(e) {
        if (e.target === this) {
            this.classList.add('hidden');
            document.body.style.overflow = '';
        }
    });

    updateWinnerText();
    setInterval(updateWinnerText,12000);
    render();
    </script>
</body>
</html>
